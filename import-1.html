<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>استيراد المبيعات - كوفتا المنصورة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --black:#000000;
    --gold:#d4af37;
    --red:#c00000;
    --white:#ffffff;
    --green:#1e7b34;
    --yellow:#ffe600;
    --gray:#f4f4f4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Tahoma, Arial, sans-serif;
    background:var(--white);
    color:var(--black);
    padding-bottom:40px;
  }
  header{
    background:var(--black);
    color:var(--gold);
    padding:18px 16px;
    text-align:center;
    position:sticky; top:0; z-index:10;
  }
  header h1{margin:0; font-size:1.15rem; font-weight:700;}
  header p{margin:4px 0 0; font-size:.75rem; color:var(--white); opacity:.8;}

  .wrap{max-width:560px; margin:0 auto; padding:16px;}

  .pickbox{
    border:3px dashed var(--gold);
    border-radius:14px;
    background:var(--gray);
    padding:28px 16px;
    text-align:center;
    margin-bottom:18px;
  }
  .pickbox input[type=file]{display:none;}
  .pick-btn{
    display:inline-block;
    background:var(--gold);
    color:var(--black);
    font-weight:700;
    font-size:1.05rem;
    padding:16px 28px;
    border-radius:10px;
    cursor:pointer;
    border:2px solid var(--black);
    width:100%;
    max-width:320px;
  }
  .pick-btn:active{transform:scale(.97);}
  .hint{font-size:.78rem; color:#555; margin-top:10px;}

  .status{
    padding:12px 14px;
    border-radius:10px;
    font-size:.9rem;
    font-weight:700;
    margin-bottom:14px;
    display:none;
  }
  .status.show{display:block;}
  .status.ok{background:var(--green); color:var(--white);}
  .status.bad{background:var(--red); color:var(--white);}
  .status.warn{background:var(--yellow); color:var(--black);}

  .actions{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .btn{
    flex:1;
    min-width:140px;
    padding:13px 10px;
    border-radius:10px;
    border:2px solid var(--black);
    font-weight:700;
    font-size:.95rem;
    cursor:pointer;
    text-align:center;
  }
  .btn-copy{background:var(--black); color:var(--gold);}
  .btn-dl{background:var(--gold); color:var(--black);}
  .btn[disabled]{opacity:.4; cursor:not-allowed;}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:.85rem;
    background:var(--white);
  }
  thead th{
    background:var(--black);
    color:var(--gold);
    padding:8px 6px;
    position:sticky; top:0;
  }
  tbody td{
    padding:7px 6px;
    border-bottom:1px solid #ddd;
    text-align:center;
  }
  tbody tr:nth-child(even){background:var(--gray);}
  .tablewrap{
    max-height:48vh;
    overflow-y:auto;
    border:2px solid var(--black);
    border-radius:8px;
  }
  .count-row{
    display:flex; justify-content:space-between;
    background:var(--gold);
    padding:8px 12px;
    font-weight:700;
    border-radius:8px 8px 0 0;
    border:2px solid var(--black);
    border-bottom:none;
  }
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--black); color:var(--gold);
    padding:10px 20px; border-radius:30px; font-weight:700;
    opacity:0; transition:opacity .25s; pointer-events:none; z-index:99;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>📥 استيراد المبيعات</h1>
  <p>كوفتا المنصورة — يدعم ملفات HTM و Excel</p>
</header>

<div class="wrap">

  <div class="pickbox">
    <label class="pick-btn" for="fileInput">📁 اختر ملف المبيعات من الجهاز</label>
    <input type="file" id="fileInput" accept=".htm,.html,.xlsx,.xls">
    <div class="hint">تقرير Item Sales بصيغة HTM، أو ملف Excel فيه نفس البيانات</div>
  </div>

  <div id="status" class="status"></div>

  <div id="resultArea" style="display:none;">
    <div class="count-row">
      <span id="countLabel">0 صنف</span>
      <span id="sumLabel">إجمالي الكمية: 0</span>
    </div>
    <div class="tablewrap">
      <table>
        <thead>
          <tr><th>الكود</th><th>الصنف</th><th>الكمية</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>

    <div class="actions" style="margin-top:14px;">
      <button class="btn btn-copy" id="copyBtn">📋 نسخ (للصق في الإكسيل)</button>
      <button class="btn btn-dl" id="downloadBtn">⬇️ تنزيل Excel</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let parsedRows = []; // {code, name, qty}

const fileInput = document.getElementById('fileInput');
const statusBox = document.getElementById('status');
const resultArea = document.getElementById('resultArea');
const resultBody = document.getElementById('resultBody');
const countLabel = document.getElementById('countLabel');
const sumLabel = document.getElementById('sumLabel');

function showStatus(msg, type){
  statusBox.textContent = msg;
  statusBox.className = 'status show ' + type;
}
function hideResults(){
  resultArea.style.display = 'none';
  parsedRows = [];
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function renderRows(rows){
  parsedRows = rows;
  resultBody.innerHTML = '';
  let sum = 0;
  rows.forEach(r=>{
    sum += r.qty;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.code}</td><td style="text-align:right">${r.name}</td><td>${r.qty}</td>`;
    resultBody.appendChild(tr);
  });
  countLabel.textContent = rows.length + ' صنف';
  sumLabel.textContent = 'إجمالي الكمية: ' + (Math.round(sum*100)/100);
  resultArea.style.display = rows.length ? 'block' : 'none';
}

// ===== HTM PARSER (نفس منطق الاستخراج المُجرَّب) =====
function parseHTM(text){
  const lines = text.split(/\r\n|\n/);
  const divs = [];
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(line.includes('font-family') && line.includes('top:') && line.includes('left:')){
      const topM = line.match(/top:(\d+)px/);
      const leftM = line.match(/left:(\d+)px/);
      if(!topM || !leftM) continue;
      const bold = line.includes('font-weight:bold');
      let content = (lines[i+1] || '').replace(/&nbsp;/g,' ').trim();
      divs.push({top:parseInt(topM[1]), left:parseInt(leftM[1]), bold, content});
    }
  }
  const groups = {};
  divs.forEach(d=>{
    (groups[d.top] = groups[d.top] || []).push(d);
  });

  const items = [];
  let grandTotal = null;

  Object.keys(groups).forEach(top=>{
    const cols = groups[top].slice().sort((a,b)=>a.left-b.left);
    if(cols.length === 3 && !cols[0].bold && /^\d+$/.test(cols[0].content)){
      const code = parseInt(cols[0].content, 10);
      const name = cols[1].content;
      const qty = parseFloat(cols[2].content.replace(/,/g,''));
      if(!isNaN(code) && !isNaN(qty)){
        items.push({code, name, qty});
      }
    } else if(cols.length === 2 && cols[0].bold && cols[0].content.trim() === 'Totals:'){
      const v = parseFloat(cols[1].content.replace(/,/g,''));
      if(!isNaN(v)) grandTotal = v;
    }
  });

  return {items, grandTotal};
}

// ===== EXCEL PARSER (عام - أول 3 أعمدة: كود / صنف / كمية) =====
function parseExcelRows(rows){
  const items = [];
  rows.forEach(row=>{
    if(!row || row.length < 2) return;
    const c0 = row[0];
    if(typeof c0 !== 'number' || c0 <= 0) return;
    let name = '';
    let qty = null;
    for(let i=1;i<row.length;i++){
      if(typeof row[i] === 'string' && row[i].trim() !== '' && !name){
        name = row[i].trim();
      } else if(typeof row[i] === 'number'){
        qty = row[i];
      }
    }
    if(name && qty !== null){
      items.push({code: Math.round(c0), name, qty});
    }
  });
  return items;
}

fileInput.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  hideResults();
  showStatus('⏳ جاري قراءة الملف...', 'warn');

  const name = file.name.toLowerCase();
  const isHtm = name.endsWith('.htm') || name.endsWith('.html');

  const reader = new FileReader();

  if(isHtm){
    reader.onload = function(ev){
      try{
        const buf = ev.target.result;
        const decoder = new TextDecoder('windows-1256');
        const text = decoder.decode(buf);
        const {items, grandTotal} = parseHTM(text);
        if(items.length === 0){
          showStatus('⚠️ لم يتم العثور على أي صنف داخل الملف. تأكد إنه نفس نوع تقرير Item Sales.', 'bad');
          return;
        }
        renderRows(items);
        const sum = items.reduce((s,r)=>s+r.qty,0);
        const sumR = Math.round(sum*100)/100;
        if(grandTotal !== null){
          if(Math.abs(sumR - grandTotal) < 0.01){
            showStatus(`✅ تم الاستيراد بنجاح (${items.length} صنف) — وتطابق الإجمالي مع التقرير (${grandTotal})`, 'ok');
          } else {
            showStatus(`⚠️ تم الاستيراد (${items.length} صنف) لكن الإجمالي (${sumR}) لا يطابق إجمالي التقرير (${grandTotal}) — راجع البيانات قبل الاعتماد عليها.`, 'bad');
          }
        } else {
          showStatus(`✅ تم استخراج ${items.length} صنف (لم يتم العثور على صف "Totals:" للمقارنة)`, 'warn');
        }
      } catch(err){
        showStatus('❌ خطأ في تحليل ملف HTM: ' + err.message, 'bad');
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = function(ev){
      try{
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        const items = parseExcelRows(rows);
        if(items.length === 0){
          showStatus('⚠️ لم يتم العثور على بيانات بالشكل المتوقع (كود/صنف/كمية في أول 3 أعمدة). ابعت الملف في المحادثة عشان أضبط القراءة على شكله.', 'bad');
          return;
        }
        renderRows(items);
        showStatus(`✅ تم استخراج ${items.length} صنف من ملف Excel (تأكد من مراجعة الأرقام قبل الاعتماد عليها)`, 'warn');
      } catch(err){
        showStatus('❌ خطأ في تحليل ملف Excel: ' + err.message, 'bad');
      }
    };
    reader.readAsArrayBuffer(file);
  }
});

document.getElementById('copyBtn').addEventListener('click', function(){
  if(!parsedRows.length) return;
  const text = parsedRows.map(r=>`${r.code}\t${r.name}\t${r.qty}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    showToast('✅ تم النسخ - روح الصقه في الإكسيل');
  }).catch(()=>{
    showToast('تعذّر النسخ التلقائي، اعمل تحديد ونسخ يدوي');
  });
});

document.getElementById('downloadBtn').addEventListener('click', function(){
  if(!parsedRows.length) return;
  const wsData = [['الكود','الصنف','الكمية'], ...parsedRows.map(r=>[r.code, r.name, r.qty])];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'استيراد');
  const today = new Date();
  const d = today.toISOString().slice(0,10);
  XLSX.writeFile(wb, `استيراد_المبيعات_${d}.xlsx`);
  showToast('✅ تم تنزيل الملف');
});
</script>
</body>
</html>
