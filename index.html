<title>معادلة كوفتا — كوفتا المنصورة</title>
<style>

    --primary:#6366F1; --primary-dark:#4F46E5; --primary-light:#E0E7FF;
    --success:#10B981; --success-dark:#059669; --success-light:#D1FAE5;
    --danger:#F43F5E; --danger-dark:#E11D48; --danger-light:#FFE4E6;
    --warning:#F59E0B; --warning-dark:#D97706; --warning-light:#FEF3C7;
    --info:#06B6D4; --info-dark:#0891B2; --info-light:#CFFAFE;
    --violet:#8B5CF6; --violet-dark:#7C3AED; --violet-light:#EDE9FE;
    --rose:#FB7185; --rose-dark:#E11D48;
    --text:#111827; --text-light:#6B7280; --text-muted:#9CA3AF;
    --bg:#F8FAFC; --card:#FFFFFF; --border:#E2E8F0; --border-light:#F1F5F9;
    --shadow:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -2px rgba(0,0,0,0.04);
    --shadow-sm:0 4px 6px -1px rgba(0,0,0,0.06),0 2px 4px -1px rgba(0,0,0,0.03);
    --radius:16px; --radius-sm:10px; --radius-xs:6px;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:linear-gradient(135deg,#F8FAFC 0%,#EEF2FF 50%,#F0FDFA 100%);color:var(--text);font-family:"Segoe UI","Tahoma",system-ui,-apple-system,sans-serif;padding-bottom:80px;font-size:14.5px;line-height:1.6;}

  /* Header - Vibrant Indigo */
  header{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 50%,#2563EB 100%);box-shadow:0 8px 32px rgba(79,70,229,0.35);padding:18px 14px 0;color:#fff;}
  h1{margin:0 0 10px;text-align:center;font-size:clamp(22px,4.5vw,32px);font-weight:900;letter-spacing:-0.8px;text-shadow:0 2px 10px rgba(0,0,0,0.15);}
  .status{text-align:center;font-size:13px;color:rgba(255,255,255,0.9);margin-bottom:12px;font-weight:500;}
  .header-actions{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .online-toggle{
    display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.18);backdrop-filter:blur(12px);

  }
  .online-toggle:hover{background:rgba(255,255,255,0.3);transform:translateY(-1px);}
  .online-toggle.on{background:linear-gradient(135deg,var(--success),var(--success-dark));border-color:transparent;box-shadow:0 4px 12px rgba(16,185,129,0.4);}
  .online-toggle.off{background:linear-gradient(135deg,var(--danger),var(--danger-dark));border-color:transparent;box-shadow:0 4px 12px rgba(244,63,94,0.4);}
  .save-all-btn{
    background:#fff;color:var(--primary-dark);border:none;border-radius:28px;padding:9px 20px;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.12);transition:all 0.25s;
  }
  .save-all-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.18);filter:brightness(1.05);}
  .save-all-btn:active{transform:translateY(0);}

  /* Tabs */
  .tabs{display:flex;overflow-x:auto;gap:8px;padding-bottom:12px;}
  .tab{flex:0 0 auto;padding:11px 20px;border-radius:var(--radius) var(--radius) 0 0;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.65);
    font-size:13.5px;font-weight:600;cursor:pointer;border:none;border-bottom:none;white-space:nowrap;transition:all 0.25s;}
  .tab:hover{background:rgba(255,255,255,0.25);color:#fff;}
  .tab.active{background:#fff;color:var(--primary-dark);font-weight:800;box-shadow:0 -4px 16px rgba(0,0,0,0.12);}

  main{max-width:1450px;margin:0 auto;padding:24px 14px;}

  /* Cards - Glassmorphism */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow-sm);transition:all 0.3s;}
  .card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .card h2{margin:0 0 16px;font-size:20px;color:var(--primary-dark);font-weight:800;border-right:5px solid var(--primary);padding-right:14px;letter-spacing:-0.3px;}

  /* Tables - Modern */
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:13.5px;}
  th,td{padding:12px 10px;text-align:center;border-bottom:1.5px solid var(--border-light);white-space:nowrap;}
  th{background:linear-gradient(180deg,#F8FAFC,#EEF2FF);color:var(--text);font-size:12px;font-weight:800;position:sticky;top:0;z-index:2;border-bottom:3px solid var(--primary);text-transform:uppercase;letter-spacing:0.8px;padding:14px 10px;}
  td.name{text-align:right;padding-right:14px;color:#111827;font-weight:800;position:sticky;right:0;background:var(--card);z-index:1;min-width:130px;font-size:14.5px;}
  tr:nth-child(even) td{background:#FAFBFF;}
  tr:nth-child(even) td.name{background:#FAFBFF;}
  tr:hover td{background:linear-gradient(90deg,var(--primary-light),#F0FDFA);transition:all 0.15s;}
  tr:hover td.name{background:linear-gradient(90deg,var(--primary-light),#F0FDFA);}
  .tablewrap{overflow:auto;max-height:65vh;border:1.5px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 2px 8px rgba(0,0,0,0.04);}

  /* Inputs - Modern */
  input[type=number],input[type=text]{width:64px;background:#fff;color:#111827;border:2px solid var(--border-light);
    border-radius:var(--radius-xs);padding:8px 6px;text-align:center;font-size:13.5px;font-weight:700;transition:all 0.2s;}
  input[type=number]:focus,input[type=text]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-light);background:#FAFBFF;}
  input.wide{width:170px;text-align:right;padding-right:10px;}
  input.tiny{width:54px;}

  /* Buttons - Vibrant */
  .toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;}
  button{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:var(--radius-xs);
    padding:11px 18px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(99,102,241,0.35);transition:all 0.25s;}
  button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,0.45);filter:brightness(1.08);}
  button:active{transform:translateY(0);}
  button.secondary{background:#fff;border:2px solid var(--border);color:var(--text);box-shadow:var(--shadow-sm);}
  button.secondary:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);box-shadow:0 4px 12px rgba(99,102,241,0.15);}
  button.danger{background:linear-gradient(135deg,var(--danger),var(--danger-dark));color:#fff;padding:7px 14px;font-size:12.5px;border-radius:var(--radius-xs);box-shadow:0 4px 12px rgba(244,63,94,0.3);}
  button.danger:hover{box-shadow:0 6px 16px rgba(244,63,94,0.4);}

  /* Pills - Vibrant */
  .pill{background:linear-gradient(135deg,var(--primary-light),#E0E7FF);border:1.5px solid #C7D2FE;border-radius:24px;padding:8px 16px;font-size:13.5px;color:var(--primary-dark);display:inline-block;margin:4px;font-weight:700;box-shadow:0 2px 6px rgba(99,102,241,0.1);}
  .pill b{color:var(--primary-dark);font-weight:800;}

  /* Status Colors - Graphic & Vibrant with Dark Text for Readability */
  .cell-red{background:linear-gradient(135deg,#FECDD3,#FDA4AF);color:#881337;font-weight:800;border-radius:10px;padding:6px 10px;box-shadow:0 2px 6px rgba(244,63,94,0.2);font-size:13.5px;}
  .cell-orange{background:linear-gradient(135deg,#FED7AA,#FDBA74);color:#7C2D12;font-weight:800;border-radius:10px;padding:6px 10px;box-shadow:0 2px 6px rgba(245,158,11,0.2);font-size:13.5px;}
  .cell-green{background:linear-gradient(135deg,#A7F3D0,#6EE7B7);color:#064E3B;font-weight:800;border-radius:10px;padding:6px 10px;box-shadow:0 2px 6px rgba(16,185,129,0.2);font-size:13.5px;}
  .cell-violet{background:linear-gradient(135deg,#DDD6FE,#C4B5FD);color:#5B21B6;font-weight:800;border-radius:10px;padding:6px 10px;box-shadow:0 2px 6px rgba(139,92,246,0.2);font-size:13.5px;}
  .cell-cyan{background:linear-gradient(135deg,#A5F3FC,#67E8F9);color:#164E63;font-weight:800;border-radius:10px;padding:6px 10px;box-shadow:0 2px 6px rgba(6,182,212,0.2);font-size:13.5px;}
  .ag-col{background:linear-gradient(135deg,#BAE6FD,#7DD3FC);color:#0C4A6E;font-weight:800;border-radius:10px;padding:6px 10px;box-shadow:0 2px 6px rgba(59,130,246,0.2);font-size:13.5px;}

  /* Toast - Vibrant */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(24px);background:linear-gradient(135deg,var(--success),var(--success-dark));color:#fff;
    padding:14px 32px;border-radius:32px;font-weight:800;font-size:16px;opacity:0;pointer-events:none;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);z-index:60;box-shadow:0 12px 32px rgba(16,185,129,0.4);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Notes */
  .note{font-size:13px;color:var(--text-light);margin-top:12px;line-height:1.8;background:linear-gradient(135deg,var(--primary-light),#F0FDFA);padding:14px 18px;border-radius:var(--radius-sm);border-right:4px solid var(--primary);font-weight:500;}

  /* Grid */
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}

  /* Pick Button */
  .pick-btn{width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--primary),var(--violet));color:#fff;border:none;border-radius:var(--radius);
    padding:28px 18px;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(99,102,241,0.35);transition:all 0.3s;}
  .pick-btn:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(99,102,241,0.45);filter:brightness(1.08);}
  .pick-btn:active{transform:translateY(-1px);}
  .pick-btn-title{font-size:20px;font-weight:900;}
  .pick-btn-sub{font-size:13px;font-weight:600;opacity:.9;}

  input[type=file]{display:none;}
  .drop{border:2.5px dashed var(--primary);border-radius:var(--radius-sm);padding:18px;text-align:center;margin-top:14px;font-size:14px;color:var(--primary);cursor:pointer;background:linear-gradient(135deg,var(--primary-light),#F0FDFA);transition:all 0.25s;font-weight:600;}
  .drop:hover{background:#DBEAFE;border-style:solid;transform:translateY(-2px);box-shadow:0 4px 12px rgba(99,102,241,0.15);}

  /* Scrollbar - Graphic */
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);border-radius:5px;}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--primary),var(--violet));border-radius:5px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--primary-dark),var(--violet-dark));}

  /* Login Gate */
  .login-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 50%,#2563EB 100%);padding:20px;}
  .login-box{background:#fff;border-radius:var(--radius);padding:36px 28px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .login-box .emoji{font-size:40px;margin-bottom:6px;}
  .login-box h2{margin:0 0 6px;font-size:19px;font-weight:900;color:var(--primary-dark);}
  .login-box p{margin:0 0 18px;font-size:13px;color:var(--text-light);}
  .login-box input[type=password]{width:100%;font-size:16px;padding:12px 14px;border-radius:var(--radius-sm);border:2px solid var(--border-light);text-align:center;font-weight:700;letter-spacing:2px;}
  .login-box input[type=password]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-light);}
  .login-box button{width:100%;margin-top:14px;padding:12px;font-size:14.5px;}
  .login-box .login-error{color:var(--danger-dark);font-size:12.5px;font-weight:700;margin-top:10px;min-height:16px;}

  /* Responsive */
  @media (max-width:768px){
    .header-actions{gap:8px;}
    .save-all-btn{padding:7px 14px;font-size:12px;}
    .card{padding:16px;}
    th,td{padding:10px 6px;font-size:12.5px;}
    input[type=number],input[type=text]{width:54px;padding:5px 3px;}
  }
</style>
</head>

/* ============================================================
   دمج الحالة (Deep Merge) — بيضمن ماتضيعش بيانات nested
   ============================================================ */
function mergeState(loaded){
  const def = defaultState();
  function deepMerge(target, source){
    if(source === null || source === undefined) return target;
    if(typeof source !== 'object') return source;
    if(Array.isArray(source)) return source.slice();
    const result = {};
    const keys = new Set([...Object.keys(target || {}), ...Object.keys(source || {})]);
    for(const key of keys){
      if(source.hasOwnProperty(key)){
        if(typeof source[key] === 'object' && source[key] !== null && !Array.isArray(source[key]) &&
           typeof target[key] === 'object' && target[key] !== null && !Array.isArray(target[key])){
          result[key] = deepMerge(target[key], source[key]);
        } else {
          result[key] = source[key];
        }
      } else {
        result[key] = target[key];
      }
    }
    return result;
  }
  state = deepMerge(def, loaded);
}

async function loadState(){
  if(isOnlineMode){
    try{
      const snap = await getDoc(STATE_DOC);
      if(snap.exists()){
        const loaded = JSON.parse(snap.data().data);
        mergeState(loaded);
        cacheLocally();
        document.getElementById('status').textContent = 'تم تحميل آخر نسخة من Firebase ☁️';
        return;
      }
    }catch(e){
      console.error(e);
      document.getElementById('status').textContent = '⚠️ تعذر الاتصال بـ Firebase - جاري التحميل من النسخة المحلية';
    }
  }
  // أوفلاين أو فشل الاتصال: حمّل من النسخة المحلية المخزنة
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      mergeState(JSON.parse(raw));
      document.getElementById('status').textContent = 'نسخة محلية' + (isOnlineMode ? '' : ' (وضع أوفلاين)');
      return;
    }

}

/* ============================================================
   محرك الحسابات (مطابق لمعادلات الإكسيل الأصلية)
   ============================================================ */
function computeMaterials(){
  const totals = {};
  for(const item of state.raw){
    const recipe = RECIPES[item.code];
    if(!recipe) continue;
    for(const [material,factor] of Object.entries(recipe.factors)){
      totals[material] = (totals[material]||0) + (Number(item.qty)||0)*factor;
    }
  }
  return totals;
}
function computeSupplyAG(sheet, label){
  const def = SHEET_DEFS[sheet].find(d=>d.label===label);
  const days = state.supply[sheet][label];
  const sum = days.reduce((s,v)=>s+(Number(v)||0), 0);
  return sum * def.factor;
}
function computeCoreFromSheet(sheet, core){
  let total = 0;
  for(const def of SHEET_DEFS[sheet]) if(def.core===core) total += computeSupplyAG(sheet, def.label);
  return total;
}
function computeRayebInventoryTotal(){
  const r = state.rayebInv;
  return (Number(r.rayebKham)||0)*0.95 + (Number(r.rayebMasnoo)||0)*0.18 + (Number(r.serbToot)||0)*4.45 + (Number(r.serbKiwi)||0)*4.2;
}
function computeAnalysis(){
  const materials = computeMaterials();
  const rows = [];
  let eKofta=0, eHawawshi=0;
  for(const core of state.coreItems){
    const manual = state.analysis[core] || {b:0,h:0};
    const isStandard = MATERIAL_MAP.hasOwnProperty(core);
    const cf = state.customFields[core] || {};
    const code = (state.itemCodes[core]||'').trim();
    const rawMatch = code ? state.raw.find(r=>String(r.code).trim()===code) : null;
    const linkedByCode = !!rawMatch;

    const c = isStandard ? computeCoreFromSheet('الاستلامات', core) : (Number(cf.c)||0);
    const d = isStandard ? computeCoreFromSheet('محول له', core) : (Number(cf.d)||0);
    const f = isStandard ? computeCoreFromSheet('محول منه', core) : (Number(cf.f)||0);
    const g = isStandard ? computeCoreFromSheet('اعدامات', core) : (Number(cf.g)||0);
    let e;
    if(core==='فحم') e = null; // يُحسب لاحقًا برسبي الفحم
    else if(isStandard) e = materials[MATERIAL_MAP[core]] || 0;
    else if(linkedByCode) e = Number(rawMatch.qty)||0; // مرتبط بكود من شيت الخام تلقائيًا
    else e = Number(cf.e)||0; // صنف مخصص بدون كود: مباع يدوي

    if(core==='كفته') eKofta = e;
    if(core==='حواوشي') eHawawshi = e;
    let h = Number(manual.h)||0;
    if(core === 'رايب') h = computeRayebInventoryTotal();
    rows.push({name: core, b: Number(manual.b)||0, c, d, e, f, g, h, isStandard, linkedByCode});
  }
  const fahmRow = rows.find(r=>r.name==='فحم');
  if(fahmRow) fahmRow.e = 84 * (((eKofta/80) + (eHawawshi/400)) / 2);
  for(const r of rows){
    r.i = ((r.b + r.c + r.d) - (r.e + r.f + r.g + r.h)) * -1;
    r.j = r.e !== 0 ? r.i / r.e : 0;
    r.k = r.e !== 0 ? r.g / r.e : 0;
    r.l = r.j - r.k;
    r.aa = r.b + r.c - r.h;
    r.ab = r.aa - r.e;
  }
  return rows;
}
function computeWagabatIstaf(){
  const kofta = Number((state.raw.find(r=>r.code==='5429')||{qty:0}).qty)||0;
  const hawawshi = Number((state.raw.find(r=>r.code==='5430')||{qty:0}).qty)||0;
  const total = kofta+hawawshi;
  return {kofta, hawawshi, total, meals: total/2};
}

/* ============================================================
   استيراد HTM (تحليل مطابق لتقرير الكاشير)
   ============================================================ */
function parseItemSales(text){
  const re = /<div style="position:absolute;top:(\d+)px;left:(\d+)px;[^"]*">\r?\n([\s\S]*?)\r?\n<\/DIV>/gi;
  const rowsByTop = new Map();
  let m;
  while((m = re.exec(text)) !== null){
    const top = parseInt(m[1],10), left = parseInt(m[2],10);
    let content = m[3].replace(/&nbsp;/g,' ').replace(/<[^>]+>/g,'').trim();
    if(!rowsByTop.has(top)) rowsByTop.set(top, []);
    rowsByTop.get(top).push([left, content]);
  }
  const tops = [...rowsByTop.keys()].sort((a,b)=>a-b);
  const items = [];
  for(const top of tops){
    const cells = rowsByTop.get(top).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
    if(cells.length>=3 && /^\d{3,}$/.test(cells[0])){
      const qty = parseFloat(cells[2].replace(/,/g,''));
      if(!isNaN(qty)) items.push({code:cells[0], name:cells[1], qty});
    }
  }
  const merged = new Map();
  for(const it of items){
    if(merged.has(it.code)) merged.get(it.code).qty += it.qty;
    else merged.set(it.code, {...it});
  }
  return [...merged.values()];
}
async function handleHtmFile(file){
  try{
    const buf = await file.arrayBuffer();
    let text;
    try{ text = new TextDecoder('windows-1256').decode(buf); }
    catch(e){ text = new TextDecoder('utf-8').decode(buf); }
    const rows = parseItemSales(text);
    if(rows.length===0){ showToast('⚠️ مفيش بيانات في الملف ده'); return; }
    // استبدال شيت الخام بالكامل بالبيانات الجديدة (تقرير مجمّع)
    for(const r of rows){
      const existing = state.raw.find(x=>x.code===r.code);
      if(existing){ existing.qty = r.qty; existing.name = r.name; }
      else state.raw.push({code:r.code, name:r.name, qty:r.qty});
    }
    showToast(`✓ تم استيراد ${rows.length} صنف تلقائيًا`);
    renderAll();
  }catch(err){
    showToast('⚠️ خطأ: '+err.message);
  }
}
document.getElementById('fileInput').addEventListener('change', e=>{

/* ---------- عرض شيت توريد (الاستلامات/محول له/محول منه/اعدامات) ---------- */

/* ---------- تحليل المبيعات (عرض مجمّع مشتق) ---------- */
function renderTahleelMabee3at(){
  const materials = computeMaterials();
  const groups = {};
  for(const [code,r] of Object.entries(RECIPES)){
    const item = state.raw.find(x=>x.code===code);
    const qty = item ? Number(item.qty)||0 : 0;
    for(const [material,factor] of Object.entries(r.factors)){
      if(!groups[material]) groups[material] = [];
      groups[material].push({code, name:r.name, qty, contribution: qty*factor});
    }
  }
  let html = '<div class="card"><h2>تحليل المبيعات (مجمّع حسب الصنف الأساسي)</h2>';
  for(const [material, items] of Object.entries(groups)){
    const total = materials[material]||0;
    html += `<div style="margin-bottom:14px;">
      <div class="pill" style="font-size:13px;">${material}: <b>${fmt(total)}</b></div>
      <div class="tablewrap" style="margin-top:6px;max-height:220px;">
        <table><thead><tr><th>الكود</th><th>الصنف</th><th>الكمية</th><th>المساهمة</th></tr></thead>
        <tbody>${items.map(it=>`<tr><td>${it.code}</td><td class="name" style="position:static;">${it.name}</td><td>${fmt(it.qty)}</td><td>${fmt(it.contribution)}</td></tr>`).join('')}</tbody></table>
      </div></div>`;
  }
  html += '</div>';
  return html;
}

function renderMabee3at(){
  let rows = state.raw.map((it,idx)=>`

      <td><input type="text" class="wide" value="${it.name}" onchange="updateRaw(${idx},'name',this.value)"></td>
      <td><input type="number" step="any" value="${it.qty}" onchange="updateRaw(${idx},'qty',this.value)"></td>
      <td><button class="danger" onclick="deleteRawRow(${idx})">حذف</button></td>
    </tr>`).join('');
  return `
  <div class="card">
    <button type="button" class="pick-btn" id="pickBtnMain">
      <span class="pick-btn-title">📁 استيراد تلقائي من تقرير الكاشير</span>
      <span class="pick-btn-sub">اختر ملف Item Sales (HTM) من الفون أو الكمبيوتر</span>
    </button>
    <div class="drop" id="dropMain">أو اسحب الملف وافلته هنا</div>
  </div>
  <div class="card">
    <h2>المبيعات — كل الأصناف (${state.raw.length})</h2>
    <div class="toolbar">
      <button onclick="addRawRow()">➕ إضافة صنف يدوي</button>
      <button class="secondary" onclick="pasteRaw()">📋 لصق من الحافظة</button>
      <button onclick="saveState()">☁️ حفظ في Firebase</button>
    </div>
    <div class="tablewrap"><table><thead><tr><th>كود</th><th>الوصف</th><th>الكمية</th><th>—</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}
function updateRaw(idx, field, value){ state.raw[idx][field] = field==='qty' ? (parseFloat(value)||0) : value; renderAll(); }
function addRawRow(){ state.raw.push({code:'',name:'',qty:0}); renderAll(); }
function deleteRawRow(idx){ state.raw.splice(idx,1); renderAll(); }
function pasteRaw(){
  navigator.clipboard.readText().then(text=>{
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    let added=0;
    for(const line of lines){
      const parts = line.split('\t');
      if(parts.length>=3){
        const code=parts[0].trim(), name=parts[1].trim(), qty=parseFloat(parts[2].replace(/,/g,''));
        if(code && !isNaN(qty)){
          const ex = state.raw.find(r=>r.code===code);
          if(ex){ ex.qty=qty; } else state.raw.push({code,name,qty});
          added++;
        }
      }
    }
    showToast(`تم استيراد ${added} صف`);
    renderAll();
  }).catch(()=>showToast('⚠️ اسمح للمتصفح بالوصول للحافظة'));
}

    const cf = state.customFields[r.name] || {};
    const cCell = std ? `<td class="ag-col">${fmt(r.c)}</td>` : `<td><input type="number" step="any" value="${cf.c||0}" onchange="updateCustomField('${r.name}','c',this.value)"></td>`;
    const dCell = std ? `<td class="ag-col">${fmt(r.d)}</td>` : `<td><input type="number" step="any" value="${cf.d||0}" onchange="updateCustomField('${r.name}','d',this.value)"></td>`;

    const fCell = std ? `<td class="ag-col">${fmt(r.f)}</td>` : `<td><input type="number" step="any" value="${cf.f||0}" onchange="updateCustomField('${r.name}','f',this.value)"></td>`;
    const gCell = std ? `<td class="ag-col">${fmt(r.g)}</td>` : `<td><input type="number" step="any" value="${cf.g||0}" onchange="updateCustomField('${r.name}','g',this.value)"></td>`;
    return `<tr>
      <td class="name">${r.name}${!std?' <span style="font-size:9px;opacity:.6">(مخصص)</span>':''}</td>
      <td><input type="text" class="tiny" style="width:64px" value="${state.itemCodes[r.name]||''}" onchange="updateItemCode('${r.name}',this.value)" placeholder="كود"></td>
      <td><input type="number" step="any" value="${r.b}" onchange="updateAnalysis('${r.name}','b',this.value)"></td>
      ${cCell}${dCell}${eCell}${fCell}${gCell}
      <td>${isRayeb ? `<span title="محسوبة من بلوك جرد الرايب أسفل الصفحة">${fmt(r.h)} 🔒</span>` : `<input type="number" step="any" value="${r.h}" onchange="updateAnalysis('${r.name}','h',this.value)">`}</td>

      <td class="${colorClassForPct(r.j)}">${(r.j*100).toFixed(1)}%</td>
      <td class="${colorClassForPct(r.k)}">${(r.k*100).toFixed(1)}%</td>
      <td class="${colorClassForTotalPct(r.l)}">${(r.l*100).toFixed(1)}%</td>
      <td>${fmt(r.aa)}</td>
      <td class="${Math.abs(r.ab)>10?'cell-violet':(Math.abs(r.ab)>2?'cell-orange':'cell-green')}">${fmt(r.ab)}</td>
      <td><button class="danger" onclick="removeCoreItem('${r.name}')">حذف</button></td>
    </tr>`;
  }).join('');

  return `

    <h2>📊 معادلة التحليل</h2>
    <div class="toolbar" style="margin-top:10px;"><button onclick="addCoreItem()">➕ إضافة صنف جديد</button><button onclick="saveState()">☁️ حفظ في Firebase</button></div>
    <div class="tablewrap" style="margin-top:10px;"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>

    <h2>🥤 جرد الرايب (لحساب اخر المدة تلقائيًا)</h2>
    <div class="grid2">
      <div><label class="small">رايب خام (وحدة) ×0.95</label><br><input type="number" step="any" class="wide" value="${state.rayebInv.rayebKham}" onchange="updateRayebInv('rayebKham',this.value)"></div>
      <div><label class="small">رايب مصنع (وحدة) ×0.18</label><br><input type="number" step="any" class="wide" value="${state.rayebInv.rayebMasnoo}" onchange="updateRayebInv('rayebMasnoo',this.value)"></div>
      <div><label class="small">سيرب توت (وحدة) ×4.45</label><br><input type="number" step="any" class="wide" value="${state.rayebInv.serbToot}" onchange="updateRayebInv('serbToot',this.value)"></div>
      <div><label class="small">سيرب كيوي (وحدة) ×4.2</label><br><input type="number" step="any" class="wide" value="${state.rayebInv.serbKiwi}" onchange="updateRayebInv('serbKiwi',this.value)"></div>
    </div>
    <div class="pill" style="margin-top:10px;">الإجمالي (اخر المدة لصنف رايب): <b>${fmt(computeRayebInventoryTotal())} كجم</b></div>

    <h2>🍽️ وجبات الاصطفاف المضروبة</h2>
    <div class="grid2">

function updateAnalysis(name, field, value){ state.analysis[name][field] = parseFloat(value)||0; renderAll(); }
function updateRayebInv(field, value){ state.rayebInv[field] = parseFloat(value)||0; renderAll(); }
function updateCustomField(name, field, value){
  if(!state.customFields[name]) state.customFields[name] = {};
  state.customFields[name][field] = parseFloat(value)||0;
  renderAll();
}
function updateItemCode(name, value){
  state.itemCodes[name] = value;
  renderAll();
}
function addCoreItem(){
  const name = prompt('اسم الصنف الجديد:');
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  if(state.coreItems.includes(trimmed)){ showToast('⚠️ الصنف ده موجود بالفعل'); return; }
  state.coreItems.push(trimmed);
  state.analysis[trimmed] = {b:0, h:0};
  state.customFields[trimmed] = {c:0,d:0,e:0,f:0,g:0};
  state.itemCodes[trimmed] = '';
  renderAll();
  showToast('تمت إضافة "'+trimmed+'"');
}
function removeCoreItem(name){
  if(!confirm('متأكد عايز تحذف صنف "'+name+'"؟')) return;
  state.coreItems = state.coreItems.filter(x=>x!==name);
  delete state.analysis[name];
  delete state.customFields[name];
  delete state.itemCodes[name];
  renderAll();
  showToast('تم حذف "'+name+'"');
}

/* ============================================================
   رفع البيانات المحلية على Firebase (مزامنة)
   ============================================================ */
async function syncLocalToFirebase(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    showToast('⚠️ مفيش بيانات محلية لرفعها');
    return;
  }
  showToast('☁️ جاري رفع البيانات المحلية...');
  try{
    await setDoc(STATE_DOC, { data: raw, updatedAt: Date.now() });
    showToast('✓ تم رفع البيانات على Firebase بنجاح');
    document.getElementById('status').textContent = 'تم رفع البيانات: ' + new Date().toLocaleTimeString('ar-EG');
  }catch(e){
    console.error(e);
    showToast('⚠️ فشل الرفع: ' + e.message);
  }
}

/* ============================================================
   تصدير / استيراد JSON (نسخة احتياطية كاملة)
   ============================================================ */
function exportJSON(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kofta-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ تم تصدير النسخة الاحتياطية');
}
function importJSON(file){
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const loaded = JSON.parse(e.target.result);
      mergeState(loaded);
      cacheLocally();
      renderAll();
      showToast('✓ تم استيراد النسخة الاحتياطية');
    }catch(err){ showToast('⚠️ ملف JSON غير صالح: '+err.message); }
  };
  reader.readAsText(file);
}

/* ============================================================
   استرجاع من Firebase
   ============================================================ */
async function restoreFromFirebase(){
  if(!isOnlineMode){
    showToast('⚠️ حول للأونلاين الأول');
    return;
  }
  showToast('☁️ جاري استرجاع آخر نسخة من Firebase...');
  try{
    const snap = await getDoc(STATE_DOC);
    if(snap.exists()){
      const loaded = JSON.parse(snap.data().data);
      mergeState(loaded);
      cacheLocally();
      renderAll();
      showToast('✓ تم استرجاع آخر نسخة من Firebase ☁️');
      document.getElementById('status').textContent = 'تم استرجاع آخر نسخة من Firebase: ' + new Date().toLocaleTimeString('ar-EG');
    } else {
      showToast('⚠️ مفيش نسخة محفوظة على Firebase');
    }
  }catch(e){
    console.error(e);
    showToast('⚠️ فشل الاسترجاع: ' + e.message);
  }
}

/* ============================================================
   التصيير الرئيسي
   ============================================================ */
function renderAll(){
  renderTabs();
  renderHeaderActions();
  const main = document.getElementById('main');
  let html = '';
  if(activeTab==='استلامات') html = renderSupplySheet('الاستلامات');
  else if(activeTab==='محول_له') html = renderSupplySheet('محول له');
  else if(activeTab==='محول_منه') html = renderSupplySheet('محول منه');
  else if(activeTab==='اعدامات') html = renderSupplySheet('اعدامات');
  else if(activeTab==='تحليل_المبيعات') html = renderTahleelMabee3at();
  else if(activeTab==='المبيعات') html = renderMabee3at();
  else if(activeTab==='معادلة_التحليل') html = renderTahleel();
  else if(activeTab==='العيش') html = renderAysh();
  else if(activeTab==='صيانة') html = renderSiyana();
  main.innerHTML = html;

  const pickBtn = document.getElementById('pickBtnMain');
  const dropMain = document.getElementById('dropMain');
  const fileInput = document.getElementById('fileInput');
  if(pickBtn) pickBtn.onclick = ()=> fileInput.click();
  if(dropMain){
    dropMain.onclick = ()=> fileInput.click();
    dropMain.ondragover = e=>{ e.preventDefault(); };
    dropMain.ondrop = e=>{ e.preventDefault(); if(e.dataTransfer.files.length) handleHtmFile(e.dataTransfer.files[0]); };
  }
}

  const input = document.getElementById('loginPass');

  if(input.value === APP_PASSWORD){

});
