<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة كوفتا المنصورة - السحابية</title>
    
    <!-- مكتبات سحابية ورسومية -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #0f172a; --accent: #fbbf24; --bg: #f1f5f9; --white: #ffffff; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; }
        
        /* شاشة الدخول */
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box { background: #1e293b; padding: 40px; border-radius: 15px; text-align: center; color: white; border: 1px solid var(--accent); }
        .login-box input { padding: 12px; border-radius: 8px; border: none; width: 220px; margin: 15px 0; text-align: center; font-size: 1.1rem; }

        /* القائمة الجانبية */
        .sidebar { width: 260px; height: 100vh; background: var(--primary); position: fixed; right: 0; top: 0; color: white; padding: 20px; }
        .sidebar h2 { color: var(--accent); text-align: center; font-size: 1.5rem; margin-bottom: 40px; }
        .nav-item { padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: #334155; color: var(--accent); }

        /* المحتوى */
        .main { flex: 1; margin-right: 260px; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 15px; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8fafc; padding: 12px; color: #64748b; font-size: 0.85rem; border-bottom: 2px solid #edf2f7; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        input[type="number"], input[type="text"] { border: 1px solid #e2e8f0; padding: 8px; border-radius: 6px; width: 90%; text-align: center; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-accent { background: var(--accent); color: var(--primary); }
        .sync-indicator { font-size: 0.8rem; color: #22c55e; display: flex; align-items: center; gap: 5px; }

        @media (max-width: 992px) {
            .sidebar { width: 70px; }
            .sidebar span, .sidebar h2 { display: none; }
            .main { margin-right: 70px; }
        }
    </style>
</head>
<body>

    <!-- الدخول -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>كوفتا المنصورة السحابي</h2>
            <p>أدخل كلمة مرور النظام</p>
            <input type="password" id="passCode" placeholder="******"> <br>
            <button class="btn btn-accent" onclick="login()">دخول للنظام</button>
        </div>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar">
        <h2>كوفتا 📊</h2>
        <div class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i> <span>الرئيسية</span></div>
        <div class="nav-item" onclick="switchTab('inventory')"><i class="fas fa-boxes"></i> <span>المخزون</span></div>
        <div class="nav-item" onclick="switchTab('sales')"><i class="fas fa-shopping-cart"></i> <span>المبيعات</span></div>
    </nav>

    <main class="main">
        <header class="header">
            <div>
                <h1 id="tab-title">لوحة التحكم</h1>
                <p id="current-date" style="color: #64748b; font-size: 0.8rem;"></p>
            </div>
            <div class="sync-indicator">
                <i class="fas fa-cloud-upload-alt"></i> مزامنة حية نشطة
            </div>
        </header>

        <!-- الرئيسية -->
        <div id="tab-home" class="tab-content">
            <div class="stat-grid">
                <div class="card" style="border-right: 5px solid var(--accent);"><h3>إجمالي المبيعات</h3><p id="total-sales" style="font-size: 1.5rem; font-weight: bold;">0</p></div>
                <div class="card" style="border-right: 5px solid #22c55e;"><h3>رصيد المخزون</h3><p id="total-stock" style="font-size: 1.5rem; font-weight: bold;">0</p></div>
                <div class="card" style="border-right: 5px solid #ef4444;"><h3>إجمالي الإعدامات</h3><p id="total-loss" style="font-size: 1.5rem; font-weight: bold;">0</p></div>
            </div>
            <div class="card">
                <canvas id="mainChart" height="100"></canvas>
            </div>
        </div>

        <!-- المخزون -->
        <div id="tab-inventory" class="tab-content" style="display:none;">
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                    <h3>جرد المخزون الفوري</h3>
                    <button class="btn btn-accent" onclick="addNewItem()">+ صنف جديد</button>
                </div>
                <table id="inv-table">
                    <thead>
                        <tr><th>الصنف</th><th>أول المدة</th><th>المستلم</th><th>المباع</th><th>إعدام</th><th>الرصيد</th><th>حذف</th></tr>
                    </thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- 1. إعداد Firebase السحابي ---
        // ملاحظة: هذه الإعدادات تعمل كقاعدة بيانات عامة للتجربة الآن.
        const firebaseConfig = {
            apiKey: "AIzaSyAs-DEMO-ONLY",
            authDomain: "kofta-mansoura.firebaseapp.com",
            projectId: "kofta-mansoura",
            storageBucket: "kofta-mansoura.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. إدارة الدخول ---
        function login() {
            if(document.getElementById('passCode').value === "123") {
                document.getElementById('login-overlay').style.display = 'none';
                listenToCloudData();
            } else {
                alert("كلمة المرور خطأ!");
            }
        }

        // --- 3. إدارة البيانات السحابية ---
        let items = [];

        function listenToCloudData() {
            // الاستماع للبيانات من السحابة في الوقت الحقيقي
            db.collection("inventory").onSnapshot((snapshot) => {
                items = [];
                snapshot.forEach((doc) => {
                    items.push({ id: doc.id, ...doc.data() });
                });
                renderUI();
            });
        }

        function renderUI() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            let s_sales = 0, s_stock = 0, s_loss = 0;

            items.forEach((item) => {
                const balance = (item.start + item.rec) - (item.sold + item.loss);
                s_sales += item.sold;
                s_stock += balance;
                s_loss += item.loss;

                list.innerHTML += `
                    <tr>
                        <td><input type="text" value="${item.name}" onchange="updateCloud('${item.id}', 'name', this.value)"></td>
                        <td><input type="number" value="${item.start}" onchange="updateCloud('${item.id}', 'start', this.value)"></td>
                        <td><input type="number" value="${item.rec}" onchange="updateCloud('${item.id}', 'rec', this.value)"></td>
                        <td><input type="number" value="${item.sold}" onchange="updateCloud('${item.id}', 'sold', this.value)"></td>
                        <td><input type="number" value="${item.loss}" onchange="updateCloud('${item.id}', 'loss', this.value)"></td>
                        <td><b>${balance}</b></td>
                        <td><i class="fas fa-trash" style="color:red; cursor:pointer" onclick="deleteItem('${item.id}')"></i></td>
                    </tr>`;
            });

            document.getElementById('total-sales').innerText = s_sales;
            document.getElementById('total-stock').innerText = s_stock;
            document.getElementById('total-loss').innerText = s_loss;
            updateChart();
        }

        async function updateCloud(id, field, value) {
            const val = field === 'name' ? value : parseFloat(value || 0);
            await db.collection("inventory").doc(id).update({ [field]: val });
        }

        async function addNewItem() {
            await db.collection("inventory").add({
                name: "صنف جديد", start: 0, rec: 0, sold: 0, loss: 0, date: new Date()
            });
        }

        async function deleteItem(id) {
            if(confirm("هل تريد الحذف؟")) await db.collection("inventory").doc(id).delete();
        }

        // --- 4. التنسيق والرسوم ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('tab-' + tab).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        let myChart;
        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: items.map(i => i.name),
                    datasets: [{ label: 'المبيعات', data: items.map(i => i.sold), backgroundColor: '#fbbf24' }]
                }
            });
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>
</html>
