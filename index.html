<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معادلة كوفتا — كوفتا المنصورة</title>
<style>
  :root{
    --gold:#D4B483; --gold-dim:#A9855C; --black:#1B1823; --panel:#252031;
    --green:#7FA98C; --red:#BC6659; --orange:#D9A441; --border:#3E3750;
    --cream:#F1E9DC; --deep:#14121C;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--black);color:var(--gold);font-family:"Tahoma","Segoe UI",sans-serif;padding-bottom:60px;}
  header{position:sticky;top:0;z-index:30;background:var(--black);border-bottom:2px solid var(--gold-dim);padding:12px 8px 0;}
  h1{margin:0 0 8px;text-align:center;font-size:clamp(17px,4vw,25px);font-weight:800;}
  .status{text-align:center;font-size:11.5px;color:var(--gold-dim);margin-bottom:8px;}
  .header-actions{display:flex;justify-content:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .online-toggle{
    display:flex;align-items:center;gap:6px;background:#201c2b;border:1px solid var(--border);
    border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;
  }
  .online-toggle.on{color:#b7d6c2;border-color:var(--green);}
  .online-toggle.off{color:#e8a99e;border-color:var(--red);}
  .save-all-btn{
    background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#1B1823;border:none;
    border-radius:20px;padding:7px 16px;font-size:12.5px;font-weight:800;cursor:pointer;
  }
  .tabs{display:flex;overflow-x:auto;gap:5px;padding-bottom:8px;}
  .tab{flex:0 0 auto;padding:8px 14px;border-radius:16px 16px 0 0;background:#151208;color:var(--gold-dim);
    font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--border);border-bottom:none;white-space:nowrap;}
  .tab.active{background:linear-gradient(180deg,var(--green),#00934a);color:#000;}
  main{max-width:1300px;margin:0 auto;padding:14px 8px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
  .card h2{margin:0 0 10px;font-size:17px;color:var(--gold);}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{padding:5px 5px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
  th{background:#151208;color:var(--gold);font-size:11px;position:sticky;top:0;z-index:2;}
  td.name{text-align:right;padding-right:8px;color:var(--gold);font-weight:700;position:sticky;right:0;background:var(--panel);z-index:1;min-width:110px;}
  .tablewrap{overflow:auto;max-height:65vh;border:1px solid var(--border);border-radius:10px;}
  input[type=number],input[type=text]{width:52px;background:#111;color:var(--gold);border:1px solid var(--border);
    border-radius:5px;padding:4px 2px;text-align:center;font-size:12px;}
  input.wide{width:140px;text-align:right;padding-right:6px;}
  input.tiny{width:44px;}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  button{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#000;border:none;border-radius:9px;
    padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
  button.secondary{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);}
  button.danger{background:var(--red);color:#fff;padding:5px 10px;font-size:11.5px;}
  .pill{background:#151208;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--gold-dim);display:inline-block;margin:2px;}
  .pill b{color:var(--gold);}
  .cell-red{background:rgba(188,102,89,.28);color:#e8a99e;font-weight:800;}
  .cell-orange{background:rgba(217,164,65,.26);color:#f0cd8e;font-weight:800;}
  .cell-green{background:rgba(127,169,140,.24);color:#b7d6c2;font-weight:800;}
  .ag-col{background:#201c2b;color:var(--gold);font-weight:800;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;
    padding:10px 22px;border-radius:30px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .note{font-size:11.5px;color:var(--gold-dim);margin-top:8px;line-height:1.8;}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .pick-btn{width:100%;display:flex;flex-direction:column;align-items:center;gap:5px;
    background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#000;border:none;border-radius:14px;
    padding:20px 14px;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 #7a5f14;}
  .pick-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #7a5f14;}
  .pick-btn-title{font-size:16px;font-weight:800;}
  .pick-btn-sub{font-size:11.5px;font-weight:600;opacity:.75;}
  input[type=file]{display:none;}
  .drop{border:2px dashed var(--gold-dim);border-radius:10px;padding:10px;text-align:center;margin-top:10px;font-size:12px;color:var(--gold-dim);cursor:pointer;}
</style>
</head>

/* ============================================================

function emptyDays(){ return new Array(31).fill(0); }
function initSupply(){
  const supply = {};
  for(const sheet of Object.keys(SHEET_DEFS)){
    supply[sheet] = {};
    for(const def of SHEET_DEFS[sheet]) supply[sheet][def.label] = emptyDays();
  }
  return supply;
}
function defaultState(){
  const s = {
    raw: JSON.parse(JSON.stringify(DEFAULT_RAW)),
    supply: initSupply(),
    analysis: {},
    customFields: {}, // لأي صنف مضاف يدويًا: {name:{c,d,e,f,g}}
    coreItems: [...CORE_ITEMS], // قابلة للتعديل: إضافة/حذف أصناف
    itemCodes: {}, // كود يدوي لكل صنف: {name: 'code'}
    rayebInv: {rayebKham:0, rayebMasnoo:0, serbToot:0, serbKiwi:0},
    ayesh: [],
    siyana: [],
  };
  s.coreItems.forEach(c => { s.analysis[c] = {b:0, h:0}; s.itemCodes[c] = ''; });
  for(let i=1;i<=31;i++) s.ayesh.push({day:i, c:0,d:0,e:0,f:0,g:0});
  return s;
}
let state = defaultState();
const STORAGE_KEY = 'kofta-full-state-v1';
const ONLINE_MODE_KEY = 'kofta-online-mode';
let isOnlineMode = (localStorage.getItem(ONLINE_MODE_KEY) ?? 'true') === 'true';

function cacheLocally(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ console.error(e); }
}

async function saveState(){
  cacheLocally(); // نسخة محلية دايمًا، أونلاين كان أو أوفلاين
  if(!isOnlineMode){
    showToast('💾 اتحفظ محليًا (وضع أوفلاين)');
    document.getElementById('status').textContent = 'آخر حفظ محلي: ' + new Date().toLocaleTimeString('ar-EG') + ' (أوفلاين)';
    return;
  }
  try{
    await setDoc(STATE_DOC, { data: JSON.stringify(state), updatedAt: Date.now() });
    showToast('تم الحفظ في Firebase ☁️✓');
    document.getElementById('status').textContent = 'آخر حفظ: ' + new Date().toLocaleTimeString('ar-EG');
  }catch(e){ console.error(e); showToast('⚠️ فشل الحفظ: '+e.message); }
}

    if(Array.isArray(source)) return source.slice();
    const result = {};
    const keys = new Set([...Object.keys(target || {}), ...Object.keys(source || {})]);
    for(const key of keys){
      if(source.hasOwnProperty(key)){
        if(typeof source[key] === 'object' && source[key] !== null && !Array.isArray(source[key]) &&
           typeof target[key] === 'object' && target[key] !== null && !Array.isArray(target[key])){
          result[key] = deepMerge(target[key], source[key]);
        } else {
          result[key] = source[key];
        }
      } else {
        result[key] = target[key];
      }
    }
    return result;
  }
  state = deepMerge(def, loaded);
}

/* ============================================================
   محرك الحسابات (مطابق لمعادلات الإكسيل الأصلية)
   ============================================================ */
function computeMaterials(){
  const totals = {};
  for(const item of state.raw){
    const recipe = RECIPES[item.code];
    if(!recipe) continue;
    for(const [material,factor] of Object.entries(recipe.factors)){
      totals[material] = (totals[material]||0) + (Number(item.qty)||0)*factor;
    }
  }
  return totals;
}
function computeSupplyAG(sheet, label){
  const def = SHEET_DEFS[sheet].find(d=>d.label===label);
  const days = state.supply[sheet][label];
  const sum = days.reduce((s,v)=>s+(Number(v)||0), 0);
  return sum * def.factor;
}
function computeCoreFromSheet(sheet, core){
  let total = 0;
  for(const def of SHEET_DEFS[sheet]) if(def.core===core) total += computeSupplyAG(sheet, def.label);
  return total;
}
function computeRayebInventoryTotal(){
  const r = state.rayebInv;
  return (Number(r.rayebKham)||0)*0.95 + (Number(r.rayebMasnoo)||0)*0.18 + (Number(r.serbToot)||0)*4.45 + (Number(r.serbKiwi)||0)*4.2;
}
function computeAnalysis(){
  const materials = computeMaterials();
  const rows = [];
  let eKofta=0, eHawawshi=0;
  for(const core of state.coreItems){
    const manual = state.analysis[core] || {b:0,h:0};
    const isStandard = MATERIAL_MAP.hasOwnProperty(core);
    const cf = state.customFields[core] || {};
    const code = (state.itemCodes[core]||'').trim();
    const rawMatch = code ? state.raw.find(r=>String(r.code).trim()===code) : null;
    const linkedByCode = !!rawMatch;

    const c = isStandard ? computeCoreFromSheet('الاستلامات', core) : (Number(cf.c)||0);
    const d = isStandard ? computeCoreFromSheet('محول له', core) : (Number(cf.d)||0);
    const f = isStandard ? computeCoreFromSheet('محول منه', core) : (Number(cf.f)||0);
    const g = isStandard ? computeCoreFromSheet('اعدامات', core) : (Number(cf.g)||0);
    let e;
    if(core==='فحم') e = null; // يُحسب لاحقًا برسبي الفحم
    else if(isStandard) e = materials[MATERIAL_MAP[core]] || 0;
    else if(linkedByCode) e = Number(rawMatch.qty)||0; // مرتبط بكود من شيت الخام تلقائيًا
    else e = Number(cf.e)||0; // صنف مخصص بدون كود: مباع يدوي

    if(core==='كفته') eKofta = e;
    if(core==='حواوشي') eHawawshi = e;
    let h = Number(manual.h)||0;
    if(core === 'رايب') h = computeRayebInventoryTotal();
    rows.push({name: core, b: Number(manual.b)||0, c, d, e, f, g, h, isStandard, linkedByCode});
  }
  const fahmRow = rows.find(r=>r.name==='فحم');
  if(fahmRow) fahmRow.e = 84 * (((eKofta/80) + (eHawawshi/400)) / 2);
  for(const r of rows){
    r.i = ((r.b + r.c + r.d) - (r.e + r.f + r.g + r.h)) * -1;
    r.j = r.e !== 0 ? r.i / r.e : 0;
    r.k = r.e !== 0 ? r.g / r.e : 0;
    r.l = r.j - r.k;
    r.aa = r.b + r.c - r.h;
    r.ab = r.aa - r.e;
  }
  return rows;
}
function computeWagabatIstaf(){
  const kofta = Number((state.raw.find(r=>r.code==='5429')||{qty:0}).qty)||0;
  const hawawshi = Number((state.raw.find(r=>r.code==='5430')||{qty:0}).qty)||0;
  const total = kofta+hawawshi;
  return {kofta, hawawshi, total, meals: total/2};
}
function colorClassForDiff(v){ if(v<0) return 'cell-red'; if(v>0) return 'cell-green'; return ''; }
function colorClassForPct(v){ const a=Math.abs(v); if(a>0.05) return 'cell-red'; if(a>0.02) return 'cell-orange'; return 'cell-green'; }

/* ============================================================
   استيراد HTM (تحليل مطابق لتقرير الكاشير)
   ============================================================ */
function parseItemSales(text){
  const re = /<div style="position:absolute;top:(\d+)px;left:(\d+)px;[^"]*">\r?\n([\s\S]*?)\r?\n<\/DIV>/gi;
  const rowsByTop = new Map();
  let m;
  while((m = re.exec(text)) !== null){
    const top = parseInt(m[1],10), left = parseInt(m[2],10);
    let content = m[3].replace(/&nbsp;/g,' ').replace(/<[^>]+>/g,'').trim();
    if(!rowsByTop.has(top)) rowsByTop.set(top, []);
    rowsByTop.get(top).push([left, content]);
  }
  const tops = [...rowsByTop.keys()].sort((a,b)=>a-b);
  const items = [];
  for(const top of tops){
    const cells = rowsByTop.get(top).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
    if(cells.length>=3 && /^\d{3,}$/.test(cells[0])){
      const qty = parseFloat(cells[2].replace(/,/g,''));
      if(!isNaN(qty)) items.push({code:cells[0], name:cells[1], qty});
    }
  }
  const merged = new Map();
  for(const it of items){
    if(merged.has(it.code)) merged.get(it.code).qty += it.qty;
    else merged.set(it.code, {...it});
  }
  return [...merged.values()];
}
async function handleHtmFile(file){
  try{
    const buf = await file.arrayBuffer();
    let text;
    try{ text = new TextDecoder('windows-1256').decode(buf); }
    catch(e){ text = new TextDecoder('utf-8').decode(buf); }
    const rows = parseItemSales(text);
    if(rows.length===0){ showToast('⚠️ مفيش بيانات في الملف ده'); return; }
    // استبدال شيت الخام بالكامل بالبيانات الجديدة (تقرير مجمّع)
    for(const r of rows){
      const existing = state.raw.find(x=>x.code===r.code);
      if(existing){ existing.qty = r.qty; existing.name = r.name; }
      else state.raw.push({code:r.code, name:r.name, qty:r.qty});
    }
    showToast(`✓ تم استيراد ${rows.length} صنف تلقائيًا`);
    renderAll();
  }catch(err){
    showToast('⚠️ خطأ: '+err.message);
  }
}
document.getElementById('fileInput').addEventListener('change', e=>{

function pasteRaw(){
  navigator.clipboard.readText().then(text=>{
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    let added=0;
    for(const line of lines){
      const parts = line.split('\t');
      if(parts.length>=3){
        const code=parts[0].trim(), name=parts[1].trim(), qty=parseFloat(parts[2].replace(/,/g,''));
        if(code && !isNaN(qty)){
          const ex = state.raw.find(r=>r.code===code);
          if(ex){ ex.qty=qty; } else state.raw.push({code,name,qty});
          added++;
        }
      }
    }
    showToast(`تم استيراد ${added} صف`);
    renderAll();
  }).catch(()=>showToast('⚠️ اسمح للمتصفح بالوصول للحافظة'));
}

      <div><label class="small">سيرب كيوي (وحدة) ×4.2</label><br><input type="number" step="any" class="wide" value="${state.rayebInv.serbKiwi}" onchange="updateRayebInv('serbKiwi',this.value)"></div>
    </div>
    <div class="pill" style="margin-top:10px;">الإجمالي (اخر المدة لصنف رايب): <b>${fmt(computeRayebInventoryTotal())} كجم</b></div>
  </div>

  <div class="card">
    <h2>🍽️ وجبات الاصطفاف المضروبة</h2>
    <div class="grid2">
      <div class="pill">كفتة اسطاف: <b>${fmt(wagabat.kofta)}</b></div>
      <div class="pill">حواوشي اسطاف: <b>${fmt(wagabat.hawawshi)}</b></div>
      <div class="pill">الإجمالي: <b>${fmt(wagabat.total)}</b></div>
      <div class="pill">عدد الوجبات: <b>${fmt(wagabat.meals)}</b></div>
    </div>
    <div class="note">محسوبة تلقائيًا من أكواد (5429، 5430) في شيت المبيعات.</div>
  </div>`;
}
function updateAnalysis(name, field, value){ state.analysis[name][field] = parseFloat(value)||0; renderAll(); }
function updateRayebInv(field, value){ state.rayebInv[field] = parseFloat(value)||0; renderAll(); }
function updateCustomField(name, field, value){
  if(!state.customFields[name]) state.customFields[name] = {};
  state.customFields[name][field] = parseFloat(value)||0;
  renderAll();
}
function updateItemCode(name, value){
  state.itemCodes[name] = value;
  renderAll();
}
function addCoreItem(){
  const name = prompt('اسم الصنف الجديد:');
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  if(state.coreItems.includes(trimmed)){ showToast('⚠️ الصنف ده موجود بالفعل'); return; }
  state.coreItems.push(trimmed);
  state.analysis[trimmed] = {b:0, h:0};
  state.customFields[trimmed] = {c:0,d:0,e:0,f:0,g:0};
  state.itemCodes[trimmed] = '';
  renderAll();
  showToast('تمت إضافة "'+trimmed+'"');
}
function removeCoreItem(name){
  if(!confirm('متأكد عايز تحذف صنف "'+name+'"؟')) return;
  state.coreItems = state.coreItems.filter(x=>x!==name);
  delete state.analysis[name];
  delete state.customFields[name];
  delete state.itemCodes[name];
  renderAll();
  showToast('تم حذف "'+name+'"');
}

/* ---------- العيش ---------- */
function renderAysh(){
  let body = state.ayesh.map((d,idx)=>{
    const diff = ((+d.c||0)-(+d.d||0)-(+d.e||0)-(+d.f||0)-(+d.g||0));
    return `<tr>
      <td>${d.day}</td>
      <td><input type="number" step="any" value="${d.c||0}" onchange="updateAysh(${idx},'c',this.value)"></td>
      <td><input type="number" step="any" value="${d.d||0}" onchange="updateAysh(${idx},'d',this.value)"></td>
      <td><input type="number" step="any" value="${d.e||0}" onchange="updateAysh(${idx},'e',this.value)"></td>
      <td><input type="number" step="any" value="${d.f||0}" onchange="updateAysh(${idx},'f',this.value)"></td>
      <td><input type="number" step="any" value="${d.g||0}" onchange="updateAysh(${idx},'g',this.value)"></td>
      <td class="${colorClassForDiff(diff)}">${fmt(diff)} <span style="font-size:10px;opacity:.85;">${diffLabel(diff)}</span></td>
    </tr>`;
  }).join('');
  return `
  <div class="card">
    <h2>🍞 تقرير العيش</h2>
    <div class="tablewrap"><table><thead><tr><th>اليوم</th><th>استلامات</th><th>مباع</th><th>محول منه</th><th>مرتجع</th><th>هالك</th><th>الفرق</th></tr></thead><tbody>${body}</tbody></table></div>
    <div class="toolbar" style="margin-top:10px;"><button onclick="saveState()">☁️ حفظ في Firebase</button></div>
  </div>`;
}
function updateAysh(idx, field, value){ state.ayesh[idx][field] = parseFloat(value)||0; renderAll(); }

/* ---------- صيانة ---------- */
function renderSiyana(){
  let body = state.siyana.map((s,idx)=>`
    <tr>
      <td><input type="text" value="${s.date}" onchange="updateSiyana(${idx},'date',this.value)"></td>
      <td><input type="text" class="wide" value="${s.desc}" onchange="updateSiyana(${idx},'desc',this.value)"></td>
      <td><input type="number" step="any" value="${s.amount}" onchange="updateSiyana(${idx},'amount',this.value)"></td>
      <td><button class="danger" onclick="deleteSiyana(${idx})">حذف</button></td>
    </tr>`).join('');
  const total = state.siyana.reduce((s,x)=>s+(Number(x.amount)||0),0);
  return `
  <div class="card">
    <h2>🔧 صيانة</h2>
    <div class="toolbar"><button onclick="addSiyana()">➕ إضافة عملية</button><button onclick="saveState()">☁️ حفظ في Firebase</button></div>
    <div class="pill">عدد العمليات: <b>${state.siyana.length}</b></div>
    <div class="pill">إجمالي التكلفة: <b>${fmt(total)}</b></div>
    <div class="tablewrap" style="margin-top:10px;"><table><thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th>—</th></tr></thead><tbody>${body}</tbody></table></div>
  </div>`;
}
function updateSiyana(idx, field, value){ state.siyana[idx][field] = field==='amount'?(parseFloat(value)||0):value; renderAll(); }
function addSiyana(){ state.siyana.push({date:'',desc:'',amount:0}); renderAll(); }
function deleteSiyana(idx){ state.siyana.splice(idx,1); renderAll(); }

/* ============================================================
   استرجاع من Firebase
   ============================================================ */
async function restoreFromFirebase(){
  if(!isOnlineMode){
    showToast('⚠️ حول للأونلاين الأول');
    return;
  }
  showToast('☁️ جاري استرجاع آخر نسخة من Firebase...');
  try{
    const snap = await getDoc(STATE_DOC);
    if(snap.exists()){
      const loaded = JSON.parse(snap.data().data);
      mergeState(loaded);
      cacheLocally();
      renderAll();
      showToast('✓ تم استرجاع آخر نسخة من Firebase ☁️');
      document.getElementById('status').textContent = 'تم استرجاع آخر نسخة من Firebase: ' + new Date().toLocaleTimeString('ar-EG');
    } else {
      showToast('⚠️ مفيش نسخة محفوظة على Firebase');
    }
  }catch(e){
    console.error(e);
    showToast('⚠️ فشل الاسترجاع: ' + e.message);
  }
}

/* ============================================================
   التصيير الرئيسي
   ============================================================ */
function renderAll(){
  renderTabs();
  renderHeaderActions();
  const main = document.getElementById('main');
  let html = '';
  if(activeTab==='استلامات') html = renderSupplySheet('الاستلامات');
  else if(activeTab==='محول_له') html = renderSupplySheet('محول له');
  else if(activeTab==='محول_منه') html = renderSupplySheet('محول منه');
  else if(activeTab==='اعدامات') html = renderSupplySheet('اعدامات');
  else if(activeTab==='تحليل_المبيعات') html = renderTahleelMabee3at();
  else if(activeTab==='المبيعات') html = renderMabee3at();
  else if(activeTab==='معادلة_التحليل') html = renderTahleel();
  else if(activeTab==='العيش') html = renderAysh();
  else if(activeTab==='صيانة') html = renderSiyana();
  main.innerHTML = html;

  const pickBtn = document.getElementById('pickBtnMain');
  const dropMain = document.getElementById('dropMain');
  const fileInput = document.getElementById('fileInput');
  if(pickBtn) pickBtn.onclick = ()=> fileInput.click();
  if(dropMain){
    dropMain.onclick = ()=> fileInput.click();
    dropMain.ondragover = e=>{ e.preventDefault(); };
    dropMain.ondrop = e=>{ e.preventDefault(); if(e.dataTransfer.files.length) handleHtmFile(e.dataTransfer.files[0]); };
  }
}

(async function init(){
  await loadState();
  renderAll();
})();

// تعريض الدوال لـ window (لازم بعد تحويل السكريبت لـtype="module")
window.restoreFromFirebase = restoreFromFirebase;
window.saveState = saveState;
window.updateRaw = updateRaw;
window.addRawRow = addRawRow;
window.deleteRawRow = deleteRawRow;
window.pasteRaw = pasteRaw;
window.updateSupply = updateSupply;
window.updateAnalysis = updateAnalysis;
window.updateRayebInv = updateRayebInv;
window.updateAysh = updateAysh;
window.updateSiyana = updateSiyana;
window.addSiyana = addSiyana;
window.deleteSiyana = deleteSiyana;
window.updateCustomField = updateCustomField;
window.updateItemCode = updateItemCode;
window.addCoreItem = addCoreItem;
window.removeCoreItem = removeCoreItem;
window.toggleOnline = toggleOnline;
window.saveAllData = saveAllData;

</script>
</body>
